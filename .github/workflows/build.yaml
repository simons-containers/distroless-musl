name: Build and publish distroless-musl

on:
  push:
    branches: [ "main" ]
    paths:
      - Containerfile
      - versions.yaml
      - etc
  pull_request:
    branches: [ "main" ]
    paths:
      - Containerfile
      - versions.yaml
      - etc
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Load versions
        run: |
          echo "MUSL_VERSION=$(yq -r '.musl' versions.yaml)" >> $GITHUB_ENV
          echo "TZDB_VERSION=$(yq -r '.tzdb' versions.yaml)" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          docker buildx build \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --build-arg TZDB_VERSION=${TZDB_VERSION} \
            --build-arg MUSL_VERSION=${MUSL_VERSION} \
            -t ghcr.io/simons-containers/distroless-musl:${MUSL_VERSION} \
            -t ghcr.io/simons-containers/distroless-musl:latest \
            --push \
            -f Containerfile .