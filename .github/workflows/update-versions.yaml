name: Update versions

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Fetch latest versions
        uses: nick-fields/retry@v4
        with:
          max_attempts: 5
          timeout_minutes: 10
          command: |
            set -uo pipefail
            MUSL=$(git ls-remote --tags https://git.musl-libc.org/git/musl \
              | awk -F/ '{print $3}' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
              | sed 's/^v//' | sort -V | tail -1)
            TZDB=$(curl -s https://data.iana.org/time-zones/tzdb/version)
  
            yq -i ".musl = \"$MUSL\"" versions.yaml
            yq -i ".tzdb = \"$TZDB\"" versions.yaml
            git diff versions.yaml

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: update-versions
          delete-branch: true
          title: Update versions
          commit-message: Update versions
