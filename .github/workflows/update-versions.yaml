name: Update versions

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Fetch latest versions
        run: |
          MUSL=$(git ls-remote --tags https://git.musl-libc.org/git/musl \
            | awk -F/ '{print $3}' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sed 's/^v//' \
            | sort -V \
            | tail -1)

          TZDB=$(curl -s https://data.iana.org/time-zones/tzdb/version)

          yq -i ".musl = \"$MUSL\"" versions.yaml
          yq -i ".tzdb = \"$TZDB\"" versions.yaml

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: update-versions
          delete-branch: true
          title: Update musl and/or tzdb
          commit-message: Update musl and/or tzdb